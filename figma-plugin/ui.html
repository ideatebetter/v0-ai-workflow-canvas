<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, sans-serif;
      font-size: 13px;
      background: #1c1c1e;
      color: #e5e5e5;
      height: 520px;
      display: flex;
      flex-direction: column;
    }

    .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 14px; overflow-y: auto; }

    h2 { font-size: 15px; font-weight: 600; color: #fff; }
    p  { font-size: 12px; color: #888; line-height: 1.5; }
    label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }

    input, select {
      width: 100%;
      background: #2a2a2c;
      border: 1px solid #3a3a3c;
      border-radius: 8px;
      color: #e5e5e5;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
    }
    input:focus, select:focus { border-color: #F0FE00; }
    select option { background: #2a2a2c; }

    .btn {
      width: 100%; padding: 10px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn:disabled { opacity: .45; cursor: default; }
    .btn-primary { background: #F0FE00; color: #000; }
    .btn-ghost { background: transparent; color: #888; border: 1px solid #3a3a3c; }

    .divider { height: 1px; background: #2a2a2c; }

    .frame-box {
      background: #2a2a2c; border: 1px solid #3a3a3c; border-radius: 8px;
      padding: 10px 12px; display: flex; align-items: center; gap: 8px;
    }
    .frame-name { font-weight: 500; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .frame-empty { color: #555; font-style: italic; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .badge-idle   { background: #2a2a2c; color: #666; }
    .badge-live   { background: #0a3a1a; color: #4ade80; }
    .badge-sync   { background: #3a3a00; color: #F0FE00; }
    .badge-err    { background: #3a0a0a; color: #f87171; }

    #log { max-height: 100px; overflow-y: auto; }
    .log-row { display: flex; gap: 6px; font-size: 11px; padding: 3px 0; border-bottom: 1px solid #242424; }
    .log-time { color: #444; flex-shrink: 0; }
    .log-msg  { color: #888; }
    .log-ok   { color: #4ade80; }
    .log-err  { color: #f87171; }

    .row { display: flex; align-items: center; justify-content: space-between; }
    .small-btn {
      background: transparent; border: 1px solid #3a3a3c; color: #888;
      border-radius: 6px; padding: 3px 10px; font-size: 11px; cursor: pointer;
    }
    .small-btn:hover { border-color: #888; color: #e5e5e5; }
  </style>
</head>
<body>

<!-- Setup screen -->
<div id="setup-screen" class="screen">
  <div>
    <h2>Connect to Ideate</h2>
    <p style="margin-top:6px">Paste your sync token from Ideate → Settings → Figma Sync, then tap Connect.</p>
  </div>
  <div>
    <label for="token-input">Sync token</label>
    <input id="token-input" type="text" placeholder="Paste token here…" />
  </div>
  <button class="btn btn-primary" id="connect-btn">Connect</button>
  <p id="connect-error" style="color:#f87171;display:none">Could not connect — check your token and try again.</p>
</div>

<!-- Main screen -->
<div id="main-screen" class="screen" style="display:none">
  <div class="row">
    <h2>Sync with Ideate</h2>
    <button class="small-btn" id="disconnect-btn">Disconnect</button>
  </div>

  <div>
    <label>Selected frame</label>
    <div class="frame-box">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0;color:#555">
        <rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      <span id="frame-name" class="frame-name frame-empty">No frame selected — select a frame in Figma</span>
    </div>
  </div>

  <div>
    <label for="canvas-select">Target canvas</label>
    <select id="canvas-select">
      <option value="">Loading canvases…</option>
    </select>
  </div>

  <button class="btn btn-primary" id="sync-btn" disabled>Sync to canvas</button>

  <div class="divider"></div>

  <div class="row">
    <span style="font-size:12px;color:#888">Live sync (while plugin is open)</span>
    <span class="badge badge-idle" id="live-badge">Idle</span>
  </div>

  <div>
    <label>Activity</label>
    <div id="log"></div>
  </div>
</div>

<script>
  var API = 'https://atlas-prototype.com';

  // ── Persistent storage (localStorage with fallback to in-memory) ──────────
  var memStore = {};
  function storageGet(key) {
    try { return localStorage.getItem(key); } catch(e) { return memStore[key] || null; }
  }
  function storageSet(key, val) {
    try { localStorage.setItem(key, val); } catch(e) { memStore[key] = val; }
  }
  function storageDel(key) {
    try { localStorage.removeItem(key); } catch(e) { delete memStore[key]; }
  }

  // ── State ────────────────────────────────────────────────────────────────
  var token = storageGet('ideate_sync_token') || '';
  var currentFrameId = null;
  var currentFrameName = '';
  var canvases = [];
  var syncedNodeId = null;

  // ── DOM ──────────────────────────────────────────────────────────────────
  var setupScreen   = document.getElementById('setup-screen');
  var mainScreen    = document.getElementById('main-screen');
  var tokenInput    = document.getElementById('token-input');
  var connectBtn    = document.getElementById('connect-btn');
  var connectError  = document.getElementById('connect-error');
  var disconnectBtn = document.getElementById('disconnect-btn');
  var frameNameEl   = document.getElementById('frame-name');
  var canvasSelect  = document.getElementById('canvas-select');
  var syncBtn       = document.getElementById('sync-btn');
  var liveBadge     = document.getElementById('live-badge');
  var logEl         = document.getElementById('log');

  // ── Init ─────────────────────────────────────────────────────────────────
  if (token) {
    showMain();
  }

  // ── Connect ───────────────────────────────────────────────────────────────
  connectBtn.addEventListener('click', function () {
    var t = tokenInput.value.trim();
    if (!t) return;

    connectBtn.disabled = true;
    connectBtn.textContent = 'Connecting…';
    connectError.style.display = 'none';

    // Validate token by fetching canvas list
    fetch(API + '/api/figma/canvases', {
      headers: { 'Authorization': 'Bearer ' + t }
    })
    .then(function (r) {
      if (!r.ok) throw new Error('status ' + r.status);
      return r.json();
    })
    .then(function (data) {
      token = t;
      storageSet('ideate_sync_token', token);
      canvases = data.canvases || [];
      showMain();
      populateCanvases();
    })
    .catch(function () {
      connectError.style.display = 'block';
    })
    .finally(function () {
      connectBtn.disabled = false;
      connectBtn.textContent = 'Connect';
    });
  });

  disconnectBtn.addEventListener('click', function () {
    storageDel('ideate_sync_token');
    token = '';
    canvases = [];
    syncedNodeId = null;
    currentFrameId = null;
    tokenInput.value = '';
    setupScreen.style.display = 'flex';
    mainScreen.style.display = 'none';
  });

  // ── Show screens ─────────────────────────────────────────────────────────
  function showMain() {
    setupScreen.style.display = 'none';
    mainScreen.style.display  = 'flex';
    if (canvases.length === 0) fetchCanvases();
  }

  // ── Canvases ──────────────────────────────────────────────────────────────
  function fetchCanvases() {
    canvasSelect.innerHTML = '<option value="">Loading…</option>';
    fetch(API + '/api/figma/canvases', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function (r) {
      if (r.status === 401) { storageDel('ideate_sync_token'); showSetup(); throw new Error('unauth'); }
      return r.json();
    })
    .then(function (d) {
      canvases = d.canvases || [];
      populateCanvases();
    })
    .catch(function (err) {
      if (err.message !== 'unauth') addLog('Failed to load canvases', true);
    });
  }

  function showSetup() {
    mainScreen.style.display  = 'none';
    setupScreen.style.display = 'flex';
  }

  function populateCanvases() {
    canvasSelect.innerHTML = canvases.length
      ? '<option value="">Pick a canvas…</option>' + canvases.map(function (c) {
          return '<option value="' + esc(c.id) + '">' + esc(c.name) + '</option>';
        }).join('')
      : '<option value="">No canvases found</option>';
    updateSyncBtn();
  }

  // ── Sync button ───────────────────────────────────────────────────────────
  canvasSelect.addEventListener('change', updateSyncBtn);
  function updateSyncBtn() {
    syncBtn.disabled = !(currentFrameId && canvasSelect.value);
  }

  syncBtn.addEventListener('click', function () {
    if (!currentFrameId || !canvasSelect.value) return;
    syncBtn.disabled = true;
    syncBtn.textContent = 'Exporting…';
    parent.postMessage({ pluginMessage: {
      type: 'export-frame',
      frameId: currentFrameId,
      canvasId: canvasSelect.value,
      nodeId: syncedNodeId,
    }}, '*');
  });

  // ── Upload ────────────────────────────────────────────────────────────────
  function uploadSync(bytes, frameId, frameName, canvasId, existingNodeId) {
    // Convert byte array to base64 in chunks to avoid stack overflow on large frames
    var arr = new Uint8Array(bytes);
    var CHUNK = 8192;
    var str = '';
    for (var i = 0; i < arr.length; i += CHUNK) {
      str += String.fromCharCode.apply(null, arr.subarray(i, i + CHUNK));
    }
    var base64 = btoa(str);

    return fetch(API + '/api/figma/sync', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        canvasId: canvasId,
        figmaFrameId: frameId,
        figmaFrameName: frameName,
        figmaFileKey: '',
        imageData: base64,
        nodeId: existingNodeId || null,
      }),
    }).then(function (r) { return r.json(); });
  }

  // ── Messages from plugin main thread ─────────────────────────────────────
  window.onmessage = function (event) {
    var msg = event.data && event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'selection') {
      currentFrameId   = msg.id;
      currentFrameName = msg.name;
      frameNameEl.textContent = msg.name;
      frameNameEl.classList.remove('frame-empty');
      updateSyncBtn();
    }

    if (msg.type === 'no-selection') {
      currentFrameId = null;
      frameNameEl.textContent = 'No frame selected — select a frame in Figma';
      frameNameEl.classList.add('frame-empty');
      updateSyncBtn();
    }

    if (msg.type === 'frame-exported') {
      syncBtn.textContent = 'Uploading…';
      uploadSync(msg.bytes, msg.frameId, msg.frameName, msg.canvasId, msg.nodeId)
        .then(function (data) {
          if (data.nodeId) {
            syncedNodeId = data.nodeId;
            parent.postMessage({ pluginMessage: {
              type: 'sync-registered',
              frameId: msg.frameId,
              canvasId: msg.canvasId,
              nodeId: data.nodeId,
            }}, '*');
            addLog('Synced "' + msg.frameName + '"');
            setBadge('Live', 'live');
          } else {
            addLog('Sync failed: ' + (data.error || 'unknown error'), true);
          }
        })
        .catch(function (err) { addLog('Upload error: ' + err.message, true); })
        .finally(function () {
          syncBtn.textContent = 'Sync to canvas';
          syncBtn.disabled = !(currentFrameId && canvasSelect.value);
        });
    }

    if (msg.type === 'auto-sync') {
      setBadge('Syncing…', 'sync');
      uploadSync(msg.bytes, msg.frameId, msg.frameName, msg.canvasId, msg.nodeId)
        .then(function (data) {
          if (data.nodeId) { addLog('Auto-synced "' + msg.frameName + '"'); setBadge('Live', 'live'); }
        })
        .catch(function () { setBadge('Error', 'err'); });
    }

    if (msg.type === 'export-error') {
      addLog('Export error: ' + msg.message, true);
      syncBtn.textContent = 'Sync to canvas';
      syncBtn.disabled = !(currentFrameId && canvasSelect.value);
    }
  };

  // ── Helpers ───────────────────────────────────────────────────────────────
  function addLog(msg, isErr) {
    var now = new Date();
    var t = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    var row = document.createElement('div');
    row.className = 'log-row';
    row.innerHTML = '<span class="log-time">' + t + '</span>'
      + '<span class="' + (isErr ? 'log-err' : 'log-ok') + '">' + esc(msg) + '</span>';
    logEl.insertBefore(row, logEl.firstChild);
  }

  function setBadge(text, cls) {
    liveBadge.textContent = text;
    liveBadge.className = 'badge badge-' + cls;
  }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
